name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Build, vet, and run race tests without network access. The committed browser
  # bundle removes the Node dependency. Live YouTube and BotGuard tests run
  # manually because they require Chromium and network access.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  # Build and vet the nested WaxTap adapter module separately.
  provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - working-directory: provider
        run: go build ./... && go vet ./...

  # Cross-compile the pure Go CLI and daemon. Each binary drives an external
  # Chromium at runtime.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.goos }}/${{ matrix.goarch }} (no CGo)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/waxseal

  # Rebuild the committed browser bundle and require a byte-for-byte match.
  reproduce-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: rebuild and diff against the committed bundle
        run: make verify-assets

  # Build the container image. Running it requires Chromium and network access.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f compose.yaml build
